<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalena Pro</title>
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; }
        body { font-family: sans-serif; background: #f4f1ea; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 90%; max-width: 350px; }
        #app-content, #admin-panel { display: none; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .temp { font-size: 50px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h2>🔐 Accès Jalena</h2>
        <p style="font-size: 12px; color: gray;">Le code sera mémorisé sur cet appareil.</p>
        <input type="password" id="pass" placeholder="Code secret">
        <button onclick="checkPass()">Entrer</button>
    </div>

    <div id="app-content" class="card">
        <h1>🐴 Jalena</h1>
        <div class="temp" id="temp-val">--°C</div>
        <button onclick="activerNotifications()" style="background:#4a90e2; font-size: 12px;">🔔 Activer Alertes Prioritaires</button>
        <button onclick="getConseil()" style="margin-top:20px;">Quel conseil ce soir ?</button>
        <div id="reponse-ia" style="margin-top:20px; font-style: italic; color: #444;"></div>
        <button onclick="goAdmin()" style="margin-top:40px; background:none; color:gray; font-size:11px;">⚙️ Zone Admin</button>
    </div>

    <div id="admin-panel" class="card">
        <h3>⚙️ Configuration IA</h3>
        <textarea id="admin-input" rows="5" placeholder="Décris tes couvertures et tranches ici..."></textarea>
        <button onclick="updateIA()">Enregistrer</button>
        <button onclick="document.getElementById('admin-panel').style.display='none'; document.getElementById('app-content').style.display='block';" style="background:#ccc;">Retour</button>
    </div>

    <script>
        let temperature = 0;
        let tempHier = 0;
        const SECRET_KEY = "jalena2026";

        // Vérification automatique au chargement
        window.onload = function() {
            if (localStorage.getItem("jalena_auth") === SECRET_KEY) {
                showApp();
            }
        };

        function checkPass() {
            const input = document.getElementById('pass').value;
            if(input === SECRET_KEY) {
                localStorage.setItem("jalena_auth", SECRET_KEY); // Sauvegarde en cache
                showApp();
            } else { alert("Code incorrect"); }
        }

        function showApp() {
            document.getElementById('login').style.display = "none";
            document.getElementById('app-content').style.display = "block";
            initMeteo();
        }

        async function initMeteo() {
            navigator.geolocation.getCurrentPosition(async (p) => {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current_weather=true&past_days=1`);
                const d = await r.json();
                temperature = Math.round(d.current_weather.temperature);
                tempHier = Math.round(d.hourly.temperature_2m[0]);
                document.getElementById('temp-val').innerText = temperature + "°C";
            });
        }

        async function activerNotifications() {
            const p = await Notification.requestPermission();
            if (p === "granted") alert("Notifications activées !");
        }

        async function getConseil() {
            const resDiv = document.getElementById('reponse-ia');
            resDiv.innerText = "Analyse de la température..."; // Texte corrigé
            
            const r = await fetch(`/api/conseil?temp=${temperature}&tempHier=${tempHier}`);
            const d = await r.json();
            resDiv.innerText = d.message;

            if (d.isAlerte && Notification.permission === "granted") {
                new Notification("⚠️ ALERTE JALENA", { body: d.message });
            }
        }

        function goAdmin() {
            document.getElementById('app-content').style.display = "none";
            document.getElementById('admin-panel').style.display = "block";
        }

        async function updateIA() {
            const text = document.getElementById('admin-input').value;
            await fetch(`/api/conseil`, {
                method: 'POST',
                body: JSON.stringify({ text: text })
            });
            alert("Sauvegardé !");
            location.reload();
        }
    </script>
</body>
</html>
