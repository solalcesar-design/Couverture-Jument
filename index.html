<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jalena 🐴</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brown:      #7a4f2d;
            --brown-light:#c8956c;
            --cream:      #fdf6ee;
            --cream-dark: #f3e9da;
            --text:       #3a2a1a;
            --text-muted: #a08060;
            --white:      #ffffff;
            --shadow:     0 8px 40px rgba(122,79,45,0.13);
            --radius:     22px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(200,149,108,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(122,79,45,0.10) 0%, transparent 55%);
        }

        .app {
            width: 100%;
            max-width: 420px;
        }

        /* ── SCREENS ── */
        .screen { display: none; animation: fadeUp 0.45s cubic-bezier(.22,1,.36,1) both; }
        .screen.active { display: block; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── CARD ── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 32px 28px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 130px; height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,149,108,0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── LOGIN ── */
        .login-horse {
            font-size: 52px;
            text-align: center;
            margin-bottom: 8px;
            display: block;
            animation: swing 3s ease-in-out infinite;
        }
        @keyframes swing {
            0%,100% { transform: rotate(-4deg); }
            50%      { transform: rotate(4deg); }
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            text-align: center;
            color: var(--brown);
            margin-bottom: 6px;
        }
        .login-sub {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* ── INPUTS ── */
        input[type="password"], textarea {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid var(--cream-dark);
            border-radius: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            color: var(--text);
            background: var(--cream);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input[type="password"]:focus, textarea:focus {
            border-color: var(--brown-light);
            box-shadow: 0 0 0 4px rgba(200,149,108,0.15);
        }
        textarea {
            resize: vertical;
            min-height: 160px;
            line-height: 1.6;
            margin-top: 4px;
        }

        /* ── BUTTONS ── */
        .btn {
            display: block;
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, var(--brown), var(--brown-light));
            color: white;
            box-shadow: 0 6px 20px rgba(122,79,45,0.30);
            margin-top: 20px;
        }
        .btn-primary:hover { box-shadow: 0 8px 28px rgba(122,79,45,0.40); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-ghost {
            background: var(--cream-dark);
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 10px;
        }
        .btn-link {
            background: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            margin-top: 20px;
            padding: 10px;
            opacity: 0.8;
        }

        /* ── WEATHER DISPLAY ── */
        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .app-header .horse-icon { font-size: 36px; }
        .app-header-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--brown);
            line-height: 1;
        }
        .app-header-text small {
            font-size: 12px;
            color: var(--text-muted);
        }

        .temp-block {
            text-align: center;
            padding: 20px 0 24px;
        }
        .temp-big {
            font-family: 'Playfair Display', serif;
            font-size: 82px;
            font-weight: 900;
            color: var(--brown);
            line-height: 1;
            letter-spacing: -3px;
        }
        .temp-big .unit {
            font-size: 36px;
            font-weight: 700;
            vertical-align: super;
            color: var(--brown-light);
        }
        .temp-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .weather-pills {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .pill {
            flex: 1;
            background: var(--cream);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
        }
        .pill .pill-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .pill .pill-val {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            display: block;
        }
        .pill .pill-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ── RESPONSE ── */
        .response-box {
            margin-top: 20px;
            padding: 18px;
            background: var(--cream);
            border-radius: 16px;
            border-left: 4px solid var(--brown-light);
            font-size: 15px;
            line-height: 1.65;
            color: var(--text);
            display: none;
            animation: fadeUp 0.3s ease both;
        }
        .response-box.visible { display: block; }
        .response-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--brown-light);
            margin-bottom: 6px;
        }

        /* ── SPINNER ── */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ADMIN ── */
        .admin-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .admin-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--brown);
        }
        .admin-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 18px;
            line-height: 1.5;
        }
        .label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        /* ── LOCATION BAR ── */
        .location-bar {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .location-dot {
            width: 7px; height: 7px;
            background: #5cb85c;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(1.4); }
        }
        .location-dot.loading { background: var(--brown-light); }
        .location-dot.error   { background: #e74c3c; animation: none; }
    </style>
</head>
<body>
<div class="app">

    <!-- ══ ÉCRAN LOGIN ══ -->
    <div id="screen-login" class="screen active">
        <div class="card">
            <span class="login-horse">🐴</span>
            <h1 class="login-title">Jalena</h1>
            <p class="login-sub">Conseils couverture pour ton cheval</p>
            <input type="password" id="pass-input" placeholder="Code secret" autocomplete="current-password">
            <button class="btn btn-primary" onclick="checkPass()">Se connecter</button>
        </div>
    </div>

    <!-- ══ ÉCRAN APP ══ -->
    <div id="screen-app" class="screen">
        <div class="location-bar">
            <span class="location-dot loading" id="loc-dot"></span>
            <span id="loc-text">Localisation en cours…</span>
        </div>

        <div class="card">
            <div class="app-header">
                <span class="horse-icon">🐴</span>
                <div class="app-header-text">
                    <h1>Jalena</h1>
                    <small>Météo en temps réel</small>
                </div>
            </div>

            <div class="temp-block">
                <div class="temp-big" id="temp-val">--<span class="unit">°C</span></div>
                <div class="temp-label">Température actuelle</div>
            </div>

            <div class="weather-pills">
                <div class="pill">
                    <span class="pill-icon">💨</span>
                    <span class="pill-val" id="wind-val">--</span>
                    <span class="pill-label">km/h</span>
                </div>
                <div class="pill">
                    <span class="pill-icon">🌧️</span>
                    <span class="pill-val" id="rain-val">--</span>
                    <span class="pill-label">mm pluie</span>
                </div>
            </div>

            <button class="btn btn-primary" id="btn-conseil" onclick="getConseil()">
                Quelle couverture dois-je lui mettre ?
            </button>

            <div class="response-box" id="response-box">
                <div class="response-label">Conseil IA 🤖</div>
                <div id="response-text"></div>
            </div>

            <button class="btn btn-link" onclick="goAdmin()">⚙️ Configuration couverture et marge de température</button>
        </div>
    </div>

    <!-- ══ ÉCRAN ADMIN ══ -->
    <div id="screen-admin" class="screen">
        <div class="card">
            <div class="admin-header">
                <span>⚙️</span>
                <h2>Réglages</h2>
            </div>
            <p class="admin-sub">Décris tes règles de couverture selon la météo. L'IA s'en servira pour te conseiller.</p>
            <span class="label">Tes règles personnalisées</span>
            <textarea id="admin-input" placeholder="Ex: De 5 à 10°C mettre la 200g, de 10 à 15°C la 100g, au-dessus de 15°C rien…"></textarea>
            <button class="btn btn-primary" onclick="updateIA()">💾 Enregistrer les règles</button>
            <button class="btn btn-ghost" onclick="goBack()">← Retour</button>
        </div>
    </div>

</div>

<script>
    // ── STATE ──
    let meteoData = { temp: null, vent: null, pluie: null };
    const SECRET = "jalena2026";

    // ── INIT ──
    window.onload = () => {
        if (localStorage.getItem("jalena_auth") === SECRET) showApp();
        document.getElementById('pass-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkPass();
        });
    };

    // ── NAVIGATION ──
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });
        const el = document.getElementById(id);
        el.style.display = 'block';
        // Force reflow pour l'animation
        void el.offsetWidth;
        el.classList.add('active');
    }

    // ── LOGIN ──
    function checkPass() {
        const val = document.getElementById('pass-input').value;
        if (val === SECRET) {
            localStorage.setItem("jalena_auth", SECRET);
            showApp();
        } else {
            document.getElementById('pass-input').style.borderColor = '#e74c3c';
            setTimeout(() => document.getElementById('pass-input').style.borderColor = '', 1200);
            document.getElementById('pass-input').value = '';
            document.getElementById('pass-input').placeholder = 'Code incorrect, réessaie…';
        }
    }

    function showApp() {
        showScreen('screen-app');
        initMeteo();
    }

    function goAdmin() {
        showScreen('screen-admin');
        loadConfig();
    }

    function goBack() {
        showScreen('screen-app');
    }

    // ── MÉTÉO ──
    async function initMeteo() {
        setLocStatus('loading', 'Localisation en cours…');

        if (!navigator.geolocation) {
            setLocStatus('error', 'Géolocalisation non disponible');
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const { latitude, longitude } = pos.coords;
                setLocStatus('ok', `${latitude.toFixed(2)}°N, ${longitude.toFixed(2)}°E`);
                try {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=precipitation&timezone=auto&forecast_days=1`;
                    const r = await fetch(url);
                    const d = await r.json();

                    meteoData.temp  = Math.round(d.current_weather.temperature);
                    meteoData.vent  = Math.round(d.current_weather.windspeed);
                    // Prendre la pluie de l'heure actuelle
                    const hour = new Date().getHours();
                    meteoData.pluie = d.hourly.precipitation[hour] ?? 0;

                    document.getElementById('temp-val').innerHTML =
                        meteoData.temp + '<span class="unit">°C</span>';
                    document.getElementById('wind-val').innerText = meteoData.vent;
                    document.getElementById('rain-val').innerText = meteoData.pluie.toFixed(1);
                } catch (e) {
                    setLocStatus('error', 'Erreur chargement météo');
                }
            },
            (err) => {
                setLocStatus('error', 'Accès localisation refusé');
            }
        );
    }

    function setLocStatus(state, text) {
        const dot  = document.getElementById('loc-dot');
        const span = document.getElementById('loc-text');
        dot.className = 'location-dot ' + (state === 'ok' ? '' : state);
        span.innerText = text;
    }

    // ── CONSEIL IA ──
    async function getConseil() {
        const btn = document.getElementById('btn-conseil');
        const box = document.getElementById('response-box');
        const txt = document.getElementById('response-text');

        if (meteoData.temp === null) {
            txt.innerText = "La météo n'est pas encore chargée, patiente un instant…";
            box.classList.add('visible');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Analyse en cours…';
        box.classList.remove('visible');

        try {
            const r = await fetch(`/api/conseil?temp=${meteoData.temp}&vent=${meteoData.vent}&pluie=${meteoData.pluie}`);
            const d = await r.json();
            txt.innerText = d.message;
            box.classList.add('visible');
        } catch (e) {
            txt.innerText = '⚠️ Erreur de connexion, réessaie.';
            box.classList.add('visible');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Quelle couverture ce soir ?';
        }
    }

    // ── ADMIN ──
    async function loadConfig() {
        const ta = document.getElementById('admin-input');
        ta.placeholder = 'Chargement…';
        try {
            const r = await fetch('/api/conseil?mode=config');
            const d = await r.json();
            ta.value = d.config || '';
            ta.placeholder = 'Ex: De 5 à 10°C mettre la 200g…';
        } catch (e) {
            ta.placeholder = 'Impossible de charger la config';
        }
    }

    async function updateIA() {
        const text = document.getElementById('admin-input').value.trim();
        if (!text) {
            alert('Écris tes règles avant d\'enregistrer !');
            return;
        }
        const btn = event.target;
        btn.disabled = true;
        btn.innerText = '⏳ Enregistrement…';

        try {
            const r = await fetch('/api/conseil', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            if (r.ok) {
                btn.innerText = '✅ Enregistré !';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '💾 Enregistrer les règles';
                }, 2000);
            } else {
                throw new Error();
            }
        } catch (e) {
            alert('Erreur lors de l\'enregistrement');
            btn.disabled = false;
            btn.innerHTML = '💾 Enregistrer les règles';
        }
    }
</script>
</body>
</html>
