<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jalena App</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 24px; margin: 0; color: #8b5a2b; }
        .temp-main { font-size: 64px; font-weight: 800; margin: 10px 0; }
        .weather-details { display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; }
        button { background: #8b5a2b; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; }
        #login, #app-content, #admin-panel { display: none; }
        .info-pill { background: #f1f2f6; padding: 8px 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login" class="card" style="display: block;">
            <h1>🔐 Accès Jalena</h1>
            <input type="password" id="pass" placeholder="Code secret" style="width:100%; padding:15px; margin:20px 0; border-radius:12px; border:1px solid #ddd;">
            <button onclick="checkPass()">Se connecter</button>
        </div>

        <div id="app-content" class="card">
            <h1>🐴 Jalena</h1>
            <div class="temp-main" id="temp-val">--°C</div>
            <div class="weather-details">
                <span class="info-pill" id="wind-val">💨 -- km/h</span>
                <span class="info-pill" id="rain-val">🌧️ -- mm</span>
            </div>
            <button id="btn-conseil" onclick="getConseil()">Quel couverture mettre ce soir ?</button>
            <div id="reponse-ia" style="margin-top:20px; line-height: 1.5; color: #444; font-weight: 500;"></div>
            <button onclick="goAdmin()" style="background:none; color:#b2bec3; font-size:13px; margin-top:30px;">⚙️ Configuration Écurie</button>
        </div>

        <div id="admin-panel" class="card">
            <h2>⚙️ Réglages IA</h2>
            <textarea id="admin-input" rows="8" placeholder="Ex: De 10 à 15°C mettre la 100g. S'il pleut fort mettre l'imperméable..."></textarea>
            <button onclick="updateIA()">Enregistrer les règles</button>
            <button onclick="location.reload()" style="background:#dfe6e9; color:#636e72; margin-top:10px;">Retour</button>
        </div>
    </div>

    <script>
        let meteoData = { temp: 0, vent: 0, pluie: 0, tempHier: 0 };
        const SECRET_KEY = "jalena2026";

        window.onload = () => { if(localStorage.getItem("jalena_auth") === SECRET_KEY) showApp(); };

        function checkPass() {
            if(document.getElementById('pass').value === SECRET_KEY) {
                localStorage.setItem("jalena_auth", SECRET_KEY);
                showApp();
            } else { alert("Code incorrect"); }
        }

        function showApp() {
            document.getElementById('login').style.display = "none";
            document.getElementById('app-content').style.display = "block";
            initMeteo();
        }

        async function initMeteo() {
            navigator.geolocation.getCurrentPosition(async (p) => {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current_weather=true&hourly=temperature_2m,precipitation&past_days=1`);
                const d = await r.json();
                meteoData.temp = Math.round(d.current_weather.temperature);
                meteoData.vent = Math.round(d.current_weather.windspeed);
                meteoData.pluie = d.hourly.precipitation[d.hourly.precipitation.length - 1] || 0;
                meteoData.tempHier = Math.round(d.hourly.temperature_2m[0]);

                document.getElementById('temp-val').innerText = meteoData.temp + "°C";
                document.getElementById('wind-val').innerText = "💨 " + meteoData.vent + " km/h";
                document.getElementById('rain-val').innerText = "🌧️ " + meteoData.pluie + " mm";
            });
        }

        async function getConseil() {
            const resDiv = document.getElementById('reponse-ia');
            resDiv.innerText = "Analyse de la température...";
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000); 

            try {
                const r = await fetch(`/api/conseil?temp=${meteoData.temp}&vent=${meteoData.vent}&pluie=${meteoData.pluie}&tempHier=${meteoData.tempHier}`, { signal: controller.signal });
                const d = await r.json();
                clearTimeout(timeoutId);
                resDiv.innerHTML = `<b>Conseil :</b> ${d.message}`;
            } catch (e) {
                resDiv.innerText = "⚠️ L'IA ne répond pas. Vérifie tes clés API sur Vercel.";
            }
        }

        async function goAdmin() {
            document.getElementById('app-content').style.display = "none";
            document.getElementById('admin-panel').style.display = "block";
            const r = await fetch('/api/conseil');
            const d = await r.json();
            if(d.config) document.getElementById('admin-input').value = d.config.inventaire;
        }

        async function updateIA() {
            const text = document.getElementById('admin-input').value;
            await fetch(`/api/conseil`, { method: 'POST', body: JSON.stringify({ text: text }) });
            alert("Règles enregistrées !");
            location.reload();
        }
    </script>
</body>
</html>
