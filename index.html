<script>
    let meteoData = { temp: 0, vent: 0, pluie: 0, tempHier: 0 };
    const SECRET_KEY = "jalena2026";

    // Vérification auto du mot de passe mémorisé
    window.onload = () => { 
        if(localStorage.getItem("jalena_auth") === SECRET_KEY) showApp(); 
    };

    function checkPass() {
        if(document.getElementById('pass').value === SECRET_KEY) {
            localStorage.setItem("jalena_auth", SECRET_KEY);
            showApp();
        } else { alert("Code incorrect"); }
    }

    function showApp() {
        document.getElementById('login').style.display = "none";
        document.getElementById('app-content').style.display = "block";
        initMeteo();
    }

    async function initMeteo() {
        navigator.geolocation.getCurrentPosition(async (p) => {
            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current_weather=true&hourly=temperature_2m,precipitation&past_days=1`);
                const d = await r.json();
                
                meteoData.temp = Math.round(d.current_weather.temperature);
                meteoData.vent = Math.round(d.current_weather.windspeed);
                meteoData.pluie = d.hourly.precipitation[d.hourly.precipitation.length - 1] || 0;
                meteoData.tempHier = Math.round(d.hourly.temperature_2m[0]);

                document.getElementById('temp-val').innerText = meteoData.temp + "°C";
                document.getElementById('wind-val').innerText = "💨 " + meteoData.vent + " km/h";
                document.getElementById('rain-val').innerText = "🌧️ " + meteoData.pluie + " mm";
            } catch(e) { document.getElementById('temp-val').innerText = "Erreur Météo"; }
        });
    }

    // FONCTION AVEC TIMEOUT POUR ÉVITER QUE ÇA TOURNE EN BOUCLE
    async function getConseil() {
        const resDiv = document.getElementById('reponse-ia');
        resDiv.innerText = "Analyse de la température...";
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 secondes max

        try {
            const url = `/api/conseil?temp=${meteoData.temp}&vent=${meteoData.vent}&pluie=${meteoData.pluie}&tempHier=${meteoData.tempHier}`;
            const r = await fetch(url, { signal: controller.signal });
            const d = await r.json();
            
            clearTimeout(timeoutId);
            resDiv.innerHTML = `<b>Le conseil de l'IA :</b><br>${d.message}`;
            
            if (d.isAlerte && Notification.permission === "granted") {
                new Notification("⚠️ ALERTE JALENA", { body: d.message });
            }
        } catch (error) {
            resDiv.innerText = "⚠️ L'IA met trop de temps à répondre. Vérifie ta clé GEMINI_API_KEY sur Vercel ou la connexion Redis.";
        }
    }

    // Zone Admin : affiche les règles actuelles quand on l'ouvre
    async function goAdmin() {
        document.getElementById('app-content').style.display = "none";
        document.getElementById('admin-panel').style.display = "block";
        
        const res = await fetch('/api/conseil');
        const data = await res.json();
        if(data.config && data.config.inventaire) {
            document.getElementById('admin-input').value = data.config.inventaire;
        }
    }

    async function updateIA() {
        const text = document.getElementById('admin-input').value;
        const btn = event.target;
        btn.innerText = "Enregistrement...";
        
        await fetch(`/api/conseil`, { 
            method: 'POST', 
            body: JSON.stringify({ text: text }) 
        });
        
        alert("Règles enregistrées sur le serveur !");
        location.reload();
    }
</script>
